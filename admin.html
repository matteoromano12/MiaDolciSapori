<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIA FOOD — Admin Prenotazioni</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">MIA <span>FOOD</span></div>
    <div class="login-sub">Area Amministrativa · Prenotazioni</div>
    <label for="pwd">Password</label>
    <input type="password" id="pwd" placeholder="••••••••">
    <button class="btn-login" onclick="doLogin()">Accedi</button>
    <div class="login-error" id="login-error">Password non corretta. Riprova.</div>
  </div>
</div>

<div class="admin-wrap" id="admin-wrap">

  <header class="admin-header">
    <div>
      <div class="admin-logo">MIA <span>FOOD</span></div>
      <div class="admin-logo-sub">Pannello Prenotazioni</div>
    </div>
    <div class="header-right">
      <div class="day-nav">
        <button class="day-nav-btn" onclick="prevDay()">‹</button>
        <div class="day-nav-center">
          <div class="day-nav-label" id="day-label">Oggi</div>
          <div class="day-nav-full" id="day-full"></div>
        </div>
        <button class="day-nav-btn" onclick="nextDay()">›</button>
        <button class="day-nav-today" onclick="goToday()">Oggi</button>
      </div>
      <button class="btn-logout" onclick="doLogout()">Esci</button>
    </div>
  </header>

  <main class="admin-main">

    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="s-lbl">Prenotazioni</div><div class="s-val" id="s-total">–</div></div>
      <div class="stat-card"><div class="s-lbl">In attesa</div><div class="s-val amber" id="s-new">–</div></div>
      <div class="stat-card"><div class="s-lbl">Arrivati</div><div class="s-val green" id="s-confirmed">–</div></div>
      <div class="stat-card"><div class="s-lbl">Coperti attesi</div><div class="s-val red" id="s-guests">–</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Cerca nome o telefono..." oninput="renderTable()">
      </div>
      <select id="filter-status" onchange="renderTable()">
        <option value="">Tutti gli stati</option>
        <option value="new">In attesa</option>
        <option value="confirmed">Arrivati</option>
        <option value="cancelled">Cancellate</option>
      </select>
      <div class="spacer"></div>
      <button class="btn-export" onclick="exportCSV()">⬇ Esporta CSV</button>
    </div>

    <div class="table-card">
      <div class="table-scroll">
        <table id="bookings-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Data</th>
              <th>Orario</th>
              <th>Pers.</th>
              <th>Stato</th>
              <th>Note</th>
              <th>Inviata il</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="8"><div class="empty-state"><div class="icon">📋</div><p>Nessuna prenotazione ancora.</p></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="table-footer">
        <span id="table-count">0 prenotazioni</span>
        <span id="table-updated" style="font-style:italic;"></span>
      </div>
    </div>

  </main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-name">–</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
